<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

  <!-- styles-css -->
  <link rel="stylesheet" href="./style.css"> 
</head>
<body class="bg-gray-100">

  <!-- Top bar -->
  <header class="flex justify-between pt-5 pl-10 pr-10 items-center mx-auto">
    <div class="flex items-center gap-4">
      <div class="w-9 h-9">
        <img src="./assets/github-logo.png" alt="GitHub Logo">
      </div>
      <h2 class="font-semibold hidden sm:block">GitHub Issues Tracker</h2>
    </div>
    <div class="flex gap-4">
      <input id="searchInput" placeholder="Search issues..." class="border p-2 rounded w-60" type="text">
      <button id="searchBtn" class="bg-[#4A00FF] p-2 text-white rounded transition active:scale-95 flex items-center gap-1 ">
        <span><img class=" w-5 h-5" src="./assets/search.svg" alt=""></span>
        <span class="hidden sm:block mb-0.5">Search</span>
      </button>
    </div>
  </header>  

  <!-- Filter Buttons -->
  <div class="flex w-4/5 mx-auto border border-[#E4E4E7] shadow-lg p-4 rounded mt-6 m-2">
    <button id="allBtn" class="pl-8 pr-8 pt-1 pb-1 bg-[#4A00FF] text-white rounded mr-2 transition active:scale-95">All</button>
    <button id="openBtn" class="pl-8 pr-8 pt-1 pb-1 text-[#64748B] border border-[#E4E4E7] rounded mr-2 transition active:scale-95">Open</button>
    <button id="closedBtn" class="pl-8 pr-8 pt-1 pb-1 text-[#64748B] border border-[#E4E4E7] rounded transition active:scale-95">Closed</button>
  </div>

  <main class="w-4/5 mx-auto space-y-2">

    <!-- Issue tracker info -->
    <div class="flex justify-between border border-[#E4E4E7] shadow-lg p-4 rounded bg-white">
      <div class="flex items-center gap-4">
        <img src="./assets/Aperture.png" alt="Aperture">
        <div>
          <h3 id="issueCount">50 Issues</h3>
          <p class="hidden sm:block">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-3">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          <p id="openCount">Open</p>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
          <p id="closedCount">Closed</p>
        </div>
      </div>
    </div>

    <!-- Cards Container -->
    <div id="issues" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"></div>

 <!-- modal -->
<div id="issueModal" class="fixed inset-0 flex items-center justify-center hidden z-50">
  <div class="absolute inset-0 bg-black/10"></div>
  <div class="relative bg-white rounded-lg shadow-lg w-4/5 max-w-xl p-6 overflow-y-auto max-h-[90vh] z-10">
    <div id="modalContent"></div>
  </div>
</div>
  </main>


  <script src="./js/script.js"></script>
</body>
</html>
