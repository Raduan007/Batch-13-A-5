<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css"> 
</head>
<body>
    <!-- top-bar -->
     <header class="flex justify-between pt-5 pl-10 pr-10">
        <div class="flex items-center gap-4">
            <div class="w-9 h-9 ">
                <img  src="./assets/github-logo.png" alt="">
            </div>
            <div>
                <h2 class="font-semibold">GitHub Issues Tracker</h2>
            </div>
        </div>
    <div class="flex gap-4">
            <div>
            <input id="scarch" placeholder="Search issues..."
            class="border p-2 rounded w-60" type="text"
            onkeyup="searchIssues()">
        </div>
        <div>
            <button class="bg-[#4A00FF] p-2 text-white rounded">+ New Issue</button>
        </div>
    </div>
     </header>

     <!-- All open closed -->
      <div class="flex w-8/10 mx-auto border border-[#E4E4E7] shadow-lg p-4 rounded mt-15">
        <button class="pl-8 pr-8 pt-1 pb-1 bg-[#4A00FF] text-white rounded mr-2">All</button>
        <button class="pl-8 pr-8 pt-1 pb-1  text-[#64748B] border border-[#E4E4E7] rounded mr-2">Open</button>
        <button class="pl-8 pr-8 pt-1 pb-1  text-[#64748B] border border-[#E4E4E7] rounded">Closed</button>
      </div>
      <!-- issue-tracker -->
 <div class="flex justify-between w-8/10 mx-auto border border-[#E4E4E7] shadow-lg p-4 rounded m-2">
          <div class="flex items-center gap-4">
         <div>
            <img src="./assets/Aperture.png" alt="">
         </div> 

         <div>
              <h3>50 Issues</h3>
              <p>Track and manage your project issues</p>
         </div>
       </div>

<!-- open closed -->
        <div class="flex gap-3">
        
         <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <p>Open</p>
         </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
            <p>Closed</p>
         </div>
    </div>
 </div>
 <script src="./js/script.js"></script>
</body>
</html>
